<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
</head>
<body style="background-color: rgba(235, 243, 248, 0.185);">
    <div style="border:1px solid rgba(0, 0, 0, 0.1); max-width: 32rem; width: 100%; margin-inline: auto; margin-top: 1rem; padding: 1rem; border-radius: 5px; box-shadow: 1px 1px 7px rgba(0, 0, 0, 0.1); background-color: white;">
        <h1 style="text-align: center; margin-bottom: 1rem;">BMI Calculator</h1>
        <form style="display: flex; flex-direction: column; gap: 1rem;" class="form">
            <label for="height">Height</label>
            <input type="text" name="height" id="height" style="height: 30px; padding-inline:1rem">
            <label for="weight">Weight</label>
            <input type="text" name="weight" id="weight" style="height: 30px; padding-inline:1rem">
            <button type="submit" style="height: 35px; margin-top: 1rem; background-color: teal; color: white; border: none; border-radius: 2.5px; cursor: pointer;">Calculate</button>
        </form>
    </div>
    <script>
        const form = document.querySelector('.form');
        form.addEventListener('submit', (e)=>{
            e.preventDefault();
            const height = parseInt(document.querySelector('#height').value);
            const weight = parseInt(document.querySelector('#weight').value);
            if(!height || !weight){
                alert('Please enter height and weight');
                return
            }
            if(height < 0 || weight < 0 || isNaN(height) || isNaN(weight)){
                alert('Please enter valid height and weight');
                return
            }
            const bmi = (weight / ((height*height)/10000)).toFixed(2);
            alert(bmi);
        })
    </script>
</body>
</html>
