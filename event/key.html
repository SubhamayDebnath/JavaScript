<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key</title>
    <style>
        table {
  font-family: arial, sans-serif;
  border-collapse: collapse;
  width: 100%;
}
td, th {
  border: 1px solid #dddddd;
  text-align: left;
  padding: 8px;
}

tr:nth-child(even) {
  background-color: #dddddd;
}
    </style>
</head>
<body>
    <div >
        <table>
            <thead>
                <tr>
                    <th>Key</th>
                    <th>Name</th>
                    <th>Code</th>
                    <th>Location</th>
                </tr>   
            </thead>
            <tbody class="container">
            </tbody>
        </table>
    </div>
    
    <script>
        const container = document.querySelector('.container');
        window.addEventListener('keydown', (e)=>{
            container.innerHTML += `
            <tr>
                <td>${e.key == ' ' ? 'Space' : e.key}</td>
                <td>${e.code}</td>
                <td>${e.keyCode}</td>
                <td>${e.location}</td>
            </tr>
            `
        });
    </script>
</body>
</html>
